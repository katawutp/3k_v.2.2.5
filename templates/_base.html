{% load static %}
{% load django_htmx %}
<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: {{ user.darkmode|yesno:'true,false' }} }" :class="{ 'dark': darkMode }">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}KokKokKok</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}" >
    <meta property="og:site_name" content="KokKokKok">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    {% block meta_tag %}
    <meta property="og:title" content="ยินดีต้อนรับสู่ แอพก๊อกๆๆ">
    <meta prpperty="og:desctription" content="Share and discover posts!">
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}/static/images/favicon.ico">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ยินดีต้อนรับสู่ KokKokKok">
    <meta name="twitter:desctription" content="Share and discover post!">
    <meta name="image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/favicon.ico' %}">
    {% endblock %}
    {% htmx_script %}
    <script defer src="https://cdn.jsdelivr.net/npm/htmx-ext-ws"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body x-data="{ modalPage: false, modalBox: false }" class="dark:bg-black dark:text-white dark:fill-white" hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>

{% include 'includes/modal.html' %}

{% block layout %}
{% endblock %}

</body>
</html>
<script>
    // Ensure CSRF token is sent with all HTMX requests
    document.addEventListener('htmx:configRequest', function(evt) {
        // Get CSRF token from cookie
        const csrfToken = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
        if (csrfToken) {
            evt.detail.headers['X-CSRFToken'] = csrfToken;
        }
    });

    // Also ensure it works for regular form submissions
    document.addEventListener('DOMContentLoaded', function() {
        // If any form doesn't have CSRF token, add it
        document.querySelectorAll('form[method="post"]').forEach(function(form) {
            if (!form.querySelector('[name=csrfmiddlewaretoken]')) {
                const csrfToken = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
                if (csrfToken) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'csrfmiddlewaretoken';
                    input.value = csrfToken;
                    form.prepend(input);
                }
            }
        });
    });
</script>
