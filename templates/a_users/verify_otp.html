{% extends '_base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white shadow-md rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-6">Verify OTP</h2>
        <p class="text-gray-600 mb-4">Enter the 6-digit code sent to your email.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="otp_code" class="block text-gray-700 font-medium mb-2">OTP Code</label>
                <input type="text" id="otp_code" name="otp_code" required
                       class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
                Verify OTP
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="{% url 'send_otp' %}" class="text-blue-500 hover:underline">Resend OTP</a>
        </div>
    </div>
</div>
{% endblock %}
