{% extends '_base.html' %}
{% block title %}Send OTP{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white shadow-md rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-6">Send Verification Code</h2>
        <p class="text-gray-600 mb-4">We'll send a verification code to your email: <strong>{{ request.user.email }}</strong></p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
                Send OTP
            </button>
        </form>
        <div class="mt-4 text-center">
            <a href="{% url 'profile' username=request.user.username %}" class="text-blue-500 hover:underline">Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
