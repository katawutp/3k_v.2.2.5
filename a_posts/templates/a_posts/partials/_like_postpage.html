<button hx-get="{% url 'like_post' post.uuid %}?postpage=true" 
        hx-swap="outerHTML"
        id="like" class="flex items-center gap-1">
        <div class="button-article !size-8 dark:!bg-neutral-800 hover:dark:!bg-neutral-900">
            <div class="size-5 {% if user in post.likes.all %}fill-rose-500{% endif %}">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2.5L14.5 8.5L21 9.2L16 14L17.5 20.5L12 17L6.5 20.5L8 14L3 9.2L9.5 8.5L12 2.5Z"/>
                </svg>
            </div>
        </div>
        <div class="font-bold text-xs text-neutral-600 dark:text-neutral-400 tabular-nums">
            {{ post.likes.count }}
        </div>
</button> 

{% if request.htmx %}

<!-- Update like count on home post -->
<div hx-swap-oob="innerHTML" id="like_home_{{ post.uuid }}">
{% include 'a_posts/partials/_like_home.html' %}
</div>

<!-- Update like count on post likes -->
<span hx-swap-oob="innerHTML" id="post_like_{{ post.uuid }}">
    {{ post.likes.count }}
</span>

<!-- Hide un-liked post on profile page -->
{% if user not in post.likes.all %}
<div hx-swap-oob="outerHTML" id="liked_post_{{ post.uuid }}" class="hidden"></div>
{% endif %}

<!-- Update user likes on profile page -->
{% if profile_user_likes  %} 
<span hx-swap-oob="innerHTML" id="post_user_likes">
    {{ profile_user_likes }}
</span>
{% endif %}

{% endif %}
